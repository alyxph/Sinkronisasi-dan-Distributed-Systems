resolver 127.0.0.11 valid=5s ipv6=off;

upstream cache_backend {
    zone cache_backend 64k;
    server cache-1:7201 max_fails=3 fail_timeout=10s resolve;
    server cache-2:7201 max_fails=3 fail_timeout=10s resolve;
    server cache-3:7201 max_fails=3 fail_timeout=10s resolve;
}

server {
    listen 7201;

    location /docs {
        set $cache_target http://cache-1:7201;
        proxy_pass         $cache_target;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
    }

    location /openapi.yaml {
        set $cache_target http://cache-1:7201;
        proxy_pass         $cache_target;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
    }

    location / {
        proxy_pass         http://cache_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
        proxy_next_upstream   error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }
}
