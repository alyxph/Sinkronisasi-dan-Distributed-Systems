resolver 127.0.0.11 valid=5s ipv6=off;

upstream lock_backend {
    zone lock_backend 64k;
    server lock-1:7001 max_fails=3 fail_timeout=10s resolve;
    server lock-2:7001 max_fails=3 fail_timeout=10s resolve;
    server lock-3:7001 max_fails=3 fail_timeout=10s resolve;
}

server {
    listen 7001;

    location /docs {
        set $lock_target http://lock-1:7001;
        proxy_pass         $lock_target;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
    }

    location /openapi.yaml {
        set $lock_target http://lock-1:7001;
        proxy_pass         $lock_target;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
    }

    location / {
        proxy_pass         http://lock_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
        proxy_next_upstream   error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }
}
