resolver 127.0.0.11 valid=5s ipv6=off;

upstream queue_backend {
    zone queue_backend 64k;
    server queue-1:7101 max_fails=3 fail_timeout=10s resolve;
    server queue-2:7101 max_fails=3 fail_timeout=10s resolve;
    server queue-3:7101 max_fails=3 fail_timeout=10s resolve;
}

server {
    listen 7101;

    # Dynamic resolution for /docs (Swagger) and /openapi.yaml
    location /docs {
        set $queue_target http://queue-1:7101;
        proxy_pass         $queue_target;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
    }

    location /openapi.yaml {
        set $queue_target http://queue-1:7101;
        proxy_pass         $queue_target;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
    }

    location / {
        proxy_pass         http://queue_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout    30s;
        proxy_next_upstream   error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }
}
